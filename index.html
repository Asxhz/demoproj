<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BenchPost</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- Left rail -->
      <aside class="rail">
        <div class="logo">𝕏</div>
        <nav class="rail-nav">
          <a class="rail-item active">🏠 <span>Home</span></a>
          <a class="rail-item">🔎 <span>Explore</span></a>
          <a class="rail-item">🔔 <span>Notifications</span></a>
          <a class="rail-item">✉️ <span>Messages</span></a>
          <a class="rail-item">👤 <span>Profile</span></a>
        </nav>
        <div class="me">
          <span class="avatar">B</span>
          <span class="me-name"><strong>Benchmarks</strong><br /><span class="muted">@benchpost</span></span>
        </div>
      </aside>

      <!-- Feed -->
      <main class="feed">
        <header class="feed-head"><h1>Home</h1></header>

        <!-- Composer -->
        <section class="composer">
          <span class="avatar">B</span>
          <div class="composer-body">
            <textarea id="compose" rows="2" placeholder="What's happening?">Ran the frontier eval suite today. Results 👇</textarea>

            <!-- The benchmark result preview shows here after Run benchmark. -->
            <div id="run-result" class="run-result hidden"></div>

            <div class="composer-foot">
              <button id="run" class="run-btn">Run benchmark</button>
              <button id="post" class="post-btn" disabled>Post</button>
            </div>
          </div>
        </section>

        <!-- Posted tweets append here (newest first). -->
        <div id="posts"></div>
      </main>

      <!-- Right rail -->
      <aside class="trends">
        <div class="search">🔎 Search</div>
        <div class="trend-box">
          <h3>Trends for you</h3>
          <div class="trend"><span class="muted small">Tech · Trending</span><strong>#FrontierEval</strong><span class="muted small">42.1K posts</span></div>
          <div class="trend"><span class="muted small">AI · Trending</span><strong>GLM 5.2</strong><span class="muted small">18.9K posts</span></div>
          <div class="trend"><span class="muted small">Trending</span><strong>Kimi 2.5</strong><span class="muted small">12.4K posts</span></div>
          <div class="trend"><span class="muted small">Business</span><strong>"are we wasting money on AI?"</strong><span class="muted small">9,803 posts</span></div>
        </div>
      </aside>
    </div>

    <script src="app.js"></script>
  </body>
</html>
